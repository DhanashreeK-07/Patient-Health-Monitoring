<!DOCTYPE html>
<html>
<head>
    <title>Vital Signs Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>Real-Time Vital Signs</h2>
    <canvas id="chart"></canvas>

    <script>
        function loadChart() {
            fetch('/data')
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('chart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: 'Vital Value',
                            data: data.values,
                            borderWidth: 2
                        }]
                    }
                });
            });
        }

        loadChart();
        setInterval(loadChart, 5000);
    </script>
</body>
</html>
